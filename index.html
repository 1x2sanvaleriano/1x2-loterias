<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1X2 Loterías</title>
<link rel="stylesheet" href="style.css">
</head><body><h1>ÚLTIMOS RESULTADOS Y BOTES</h1><div class="contenedor" id="contenedor"></div><div class="footer">
+18 · JUEGA CON RESPONSABILIDAD
</div><script>

const crearBolas = (str) => {
  if(!str) return '-';
  return str.split(' ').filter(n => n).map(n => `<span class="bola">${n}</span>`).join('');
}

const crearEstrellas = (str) => {
  if(!str) return '-';
  return str.split(' ').filter(n => n).map(n => `<span class="bola estrella">${n}</span>`).join('');
}

fetch('datos.json')
.then(response => response.json())
.then(data => {

const contenedor = document.getElementById('contenedor');

contenedor.innerHTML = `

<div class="tarjeta primitiva">
<div class="cabecera">
<img src="img/primitiva-png.png" class="logo">
<div class="fecha">${data.primitiva?.fecha || '--/--'}</div>
</div>
<div class="contenido">
<div class="resultado">
<div class="bolas-container">${crearBolas(data.primitiva?.numeros)}</div>
<span class="info-extra">C: ${data.primitiva?.complementario || '-'}</span>
<span class="info-extra">R: ${data.primitiva?.reintegro || '-'}</span>
</div>
<div class="bote">${data.primitiva?.bote || '-'}</div>
</div>
</div>

<div class="tarjeta bonoloto">
<div class="cabecera">
<img src="img/bonoloto-png.png" class="logo">
<div class="fecha">${data.bonoloto?.fecha || '--/--'}</div>
</div>
<div class="contenido">
<div class="resultado">
<div class="bolas-container">${crearBolas(data.bonoloto?.numeros)}</div>
<span class="info-extra">C: ${data.bonoloto?.complementario || '-'}</span>
<span class="info-extra">R: ${data.bonoloto?.reintegro || '-'}</span>
</div>
<div class="bote">${data.bonoloto?.bote || '-'}</div>
</div>
</div>

<div class="tarjeta euromillones">
<div class="cabecera">
<img src="img/euromillones-png.png" class="logo">
<div class="fecha">${data.euromillones?.fecha || '--/--'}</div>
</div>
<div class="contenido">
<div class="resultado">
<div class="bolas-container">${crearBolas(data.euromillones?.numeros)}</div>
<div class="bolas-container">${crearEstrellas(data.euromillones?.estrellas)}</div>
</div>
<div class="bote">${data.euromillones?.bote || '-'}</div>
</div>
</div>

<div class="tarjeta eurodreams">
<div class="cabecera">
<img src="img/eurodreams-png.png" class="logo">
<div class="fecha">${data.eurodreams?.fecha || '--/--'}</div>
</div>
<div class="contenido">
<div class="resultado">
<div class="bolas-container">${crearBolas(data.eurodreams?.numeros)}</div>
<span class="info-extra">Sueño: ${data.eurodreams?.sueno || '-'}</span>
</div>
<div class="bote">${data.eurodreams?.premio || '-'}</div>
</div>
</div>

<div class="tarjeta gordo">
<div class="cabecera">
<img src="img/gordo-png.png" class="logo">
<div class="fecha">${data.gordo?.fecha || '--/--'}</div>
</div>
<div class="contenido">
<div class="resultado">
<div class="bolas-container">${crearBolas(data.gordo?.numeros)}</div>
<span class="info-extra">Clave: ${data.gordo?.clave || '-'}</span>
</div>
<div class="bote">${data.gordo?.bote || '-'}</div>
</div>
</div>

<div class="tarjeta quiniela">
<div class="cabecera">
<img src="img/quiniela-png.png" class="logo">
<div class="fecha">${data.quiniela?.fecha || '--/--'}</div>
</div>
<div class="contenido">
<div class="resultado">
${(() => {
  const res = data.quiniela?.resultado || '';
  const partes = res.split(' ').filter(p => p);
  const catorce = partes.slice(0, 14).join(' - ');
  const pleno = partes[14] || '';
  return `
    <div class="numeros">${catorce || '-'}</div>
    ${pleno? `<div>Pleno: ${pleno}</div>` : ''}
  `;
})()}
</div>
<div class="bote">${data.quiniela?.bote || '-'}</div>
</div>
</div>

<div class="tarjeta quinigol">
<div class="cabecera">
<img src="img/quinigol-png.png" class="logo">
<div class="fecha">${data.quinigol?.fecha || '--/--'}</div>
</div>
<div class="contenido">
<div class="resultado">
${data.quinigol?.resultado || '-'}
</div>
<div class="bote">${data.quinigol?.bote || '-'}</div>
</div>
</div>

<div class="tarjeta nacional">
<div class="cabecera">
<img src="img/loterianacional-png.png" class="logo logo-nacional">
<div class="fecha">J/S</div>
</div>
<div class="contenido-nacional">
<div class="columna-nacional">
<div class="titulo-nacional">JUEVES ${data.jueves?.fecha || '--/--'}</div>
<div class="premio-nacional">${data.jueves?.primero || '-'}</div>
<div class="reintegro-nacional">R: ${data.jueves?.reintegros || '-'}</div>
</div>
<div class="columna-nacional">
<div class="titulo-nacional">SÁBADO ${data.sabado?.fecha || '--/--'}</div>
<div class="premio-nacional">${data.sabado?.primero || '-'}</div>
<div class="reintegro-nacional">R: ${data.sabado?.reintegros || '-'}</div>
</div>
</div>
</div>

`;

})
.catch(err => {
  console.error('Error cargando datos.json:', err);
  document.getElementById('contenedor').innerHTML = '<h2 style="text-align:center;color:red;margin:40px">Error cargando datos</h2>';
});

</script></body>
</html>
