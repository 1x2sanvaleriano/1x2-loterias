<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1X2 Loterías</title>
<style>
body{background-color:#0a1f44;color:#111;font-family:Arial,sans-serif;margin:0;padding:15px}
h1{text-align:center;font-size:24px;margin-bottom:20px;color:#fff}
.contenedor{display:grid;grid-template-columns:1fr;gap:15px;max-width:1400px;margin:0 auto}
.tarjeta{background-color:rgba(255,255,255,0.5);border-radius:14px;padding:15px;box-shadow:0 8px 25px rgba(0,0,0,0.4);backdrop-filter:blur(4px)}
.cabecera{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.logo{height:96px;width:auto}
.logo-nacional{height:72px}
.fecha{color:#333;font-size:16px;font-weight:700}
.contenido{display:flex;flex-direction:column;gap:10px;align-items:center}
.resultado{width:100%;font-weight:900;line-height:1.4;text-align:center}
.bote{text-align:center;font-size:24px;font-weight:900;color:#0a1f44;background:#fffacd;border:3px solid #ffd700;border-radius:10px;padding:8px 16px;display:inline-block;box-shadow:0 4px 12px rgba(255,215,0,0.5);margin-top:8px}
.bolas-container{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;justify-content:center}
.bola{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:#0a1f44;color:#fff;font-weight:900;font-size:17px;flex-shrink:0;box-shadow:0 2px 5px rgba(0,0,0,0.3)}
.bola.estrella{background:#ffd700;color:#000}
.info-extra{font-size:17px;font-weight:700;margin:0 6px;display:inline-block}
.numeros{white-space:nowrap;overflow-x:auto;display:block;font-size:17px;margin-bottom:6px;text-align:center}
.contenido-nacional{display:flex;justify-content:space-around;text-align:center}
.columna-nacional{width:48%}
.titulo-nacional{font-size:16px;font-weight:700;margin-bottom:6px;color:#333}
.premio-nacional{font-size:26px;font-weight:900;margin-bottom:4px}
.reintegro-nacional{font-size:17px;font-weight:700}
.footer{text-align:center;margin-top:30px;font-size:22px;color:#ffd700;font-weight:900}
@media screen and (min-width:600px){
 .contenedor{grid-template-columns:repeat(2,1fr)}
 .bote{font-size:28px;padding:10px 20px}
 .bola{width:44px;height:44px;font-size:21px}
 .logo{height:120px}
 .logo-nacional{height:88px}
 .footer{font-size:24px}}
@media screen and (min-width:1000px){
 .contenedor{grid-template-columns:repeat(3,1fr);padding:0 10px}
 .bote{font-size:32px;padding:12px 24px}
 .bola{width:50px;height:50px;font-size:24px}
 .logo{height:144px}
 .logo-nacional{height:104px}
 .footer{font-size:26px}}
</style>
</head><body>
<h1>ÚLTIMOS RESULTADOS Y BOTES</h1>
<div class="contenedor" id="contenedor">Cargando...</div>
<div class="footer">+18 · JUEGA CON RESPONSABILIDAD</div>
<script>
const crearBolas = str => str ? str.split(' ').map(n=>`<span class="bola">${n}</span>`).join('') : '-';
const crearEstrellas = str => str ? str.split(' ').map(n=>`<span class="bola estrella">${n}</span>`).join('') : '-';

const datosDemo = {
  "primitiva": {"fecha":"20/04/2026","numeros":"03 08 15 22 35 46","complementario":"18","reintegro":"4","bote":"32 M€"},
  "bonoloto": {"fecha":"21/04/2026","numeros":"03 08 15 22 35 46","complementario":"18","reintegro":"4","bote":"1,8 M€"},
  "euromillones": {"fecha":"19/04/2026","numeros":"08 17 23 34 46","estrellas":"03 09","bote":"125 M€"},
  "eurodreams": {"fecha":"21/04/2026","numeros":"06 12 18 24 29 38","sueno":"4","premio":"20.000 €/MES"},
  "gordo": {"fecha":"20/04/2026","numeros":"02 10 23 31 45","clave":"8","bote":"9 M€"},
  "quiniela": {"fecha":"20/04/2026","resultado":"1 X 2 1 X 1 2 X 1 1 X 2 1 X 2 1-0","bote":"0,5 M€"},
  "quinigol": {"fecha":"20/04/2026","resultado":"2-1 0-0 3-1 2-0","bote":"0,1 M€"},
  "jueves": {"fecha":"17/04/2026","primero":"12345","reintegros":"5"},
  "sabado": {"fecha":"19/04/2026","primero":"67890","reintegros":"0"}
};

const pintar = (data, esDemo=false) => {
  if(esDemo){
    document.getElementById('contenedor').innerHTML = `<h2 style="text-align:center;color:#ffaa00;margin:10px 0">Usando datos de prueba. Revisa datos.json</h2>` + document.getElementById('contenedor').innerHTML;
  }
  document.getElementById('contenedor').innerHTML = `
  <div class="tarjeta"><div class="cabecera"><img src="img/primitiva-png.png" class="logo"><div class="fecha">${data.primitiva.fecha}</div></div><div class="contenido"><div class="resultado"><div class="bolas-container">${crearBolas(data.primitiva.numeros)}</div><span class="info-extra">C: ${data.primitiva.complementario}</span><span class="info-extra">R: ${data.primitiva.reintegro}</span></div><div class="bote">${data.primitiva.bote}</div></div></div>
  <div class="tarjeta"><div class="cabecera"><img src="img/bonoloto-png.png" class="logo"><div class="fecha">${data.bonoloto.fecha}</div></div><div class="contenido"><div class="resultado"><div class="bolas-container">${crearBolas(data.bonoloto.numeros)}</div><span class="info-extra">C: ${data.bonoloto.complementario}</span><span class="info-extra">R: ${data.bonoloto.reintegro}</span></div><div class="bote">${data.bonoloto.bote}</div></div></div>
  <div class="tarjeta"><div class="cabecera"><img src="img/euromillones-png.png" class="logo"><div class="fecha">${data.euromillones.fecha}</div></div><div class="contenido"><div class="resultado"><div class="bolas-container">${crearBolas(data.euromillones.numeros)}</div><div class="bolas-container">${crearEstrellas(data.euromillones.estrellas)}</div></div><div class="bote">${data.euromillones.bote}</div></div></div>
  <div class="tarjeta"><div class="cabecera"><img src="img/eurodreams-png.png" class="logo"><div class="fecha">${data.eurodreams.fecha}</div></div><div class="contenido"><div class="resultado"><div class="bolas-container">${crearBolas(data.eurodreams.numeros)}</div><span class="info-extra">Sueño: ${data.eurodreams.sueno}</span></div><div class="bote">${data.eurodreams.premio}</div></div></div>
  <div class="tarjeta"><div class="cabecera"><img src="img/gordo-png.png" class="logo"><div class="fecha">${data.gordo.fecha}</div></div><div class="contenido"><div class="resultado"><div class="bolas-container">${crearBolas(data.gordo.numeros)}</div><span class="info-extra">Clave: ${data.gordo.clave}</span></div><div class="bote">${data.gordo.bote}</div></div></div>
  <div class="tarjeta"><div class="cabecera"><img src="img/quiniela-png.png" class="logo"><div class="fecha">${data.quiniela.fecha}</div></div><div class="contenido"><div class="resultado"><div class="numeros">1 - X - 2 - 1 - X - 1 - 2 - X - 1 - 1 - X - 2 - 1 - X</div><div>Pleno: 2 1-0</div></div><div class="bote">${data.quiniela.bote}</div></div></div>
  <div class="tarjeta"><div class="cabecera"><img src="img/quinigol-png.png" class="logo"><div class="fecha">${data.quinigol.fecha}</div></div><div class="contenido"><div class="resultado">${data.quinigol.resultado}</div><div class="bote">${data.quinigol.bote}</div></div></div>
  <div class="tarjeta"><div class="cabecera"><img src="img/loterianacional-png.png" class="logo logo-nacional"><div class="fecha">J/S</div></div><div class="contenido-nacional"><div class="columna-nacional"><div class="titulo-nacional">JUEVES ${data.jueves.fecha}</div><div class="premio-nacional">${data.jueves.primero}</div><div class="reintegro-nacional">R: ${data.jueves.reintegros}</div></div><div class="columna-nacional"><div class="titulo-nacional">SÁBADO ${data.sabado.fecha}</div><div class="premio-nacional">${data.sabado.primero}</div><div class="reintegro-nacional">R: ${data.sabado.reintegros}</div></div></div></div>
  `;
}

let cargo = false;
const timer = setTimeout(() => {
  if(!cargo){
    pintar(datosDemo, true);
  }
}, 2000);

fetch('datos.json')
.then(r => {if(!r.ok) throw new Error(r.status); return r.json()})
.then(data => {
  cargo = true;
  clearTimeout(timer);
  pintar(data);
})
.catch(e => {
  cargo = true;
  clearTimeout(timer);
  pintar(datosDemo, true);
});
</script></body></html>
