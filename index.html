<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1X2 Loterías</title>
<link rel="stylesheet" href="style.css">
</head><body><h1>ÚLTIMOS RESULTADOS Y BOTES</h1><div class="contenedor" id="contenedor"></div><div class="footer">
+18 · JUEGA CON RESPONSABILIDAD

fetch('datos.json')
.then(response => response.json())
.then(data => {

<div class="tarjeta primitiva">

<img src="img/primitiva-png.png" class="logo">
<div class="fecha">${data.primitiva?.fecha || '--/--'}</div>
</div>
<div class="contenido">
<div class="resultado">
${txt(data.primitiva?.numeros)}
<br>
<span class="complementario">C: ${data.primitiva?.complementario || '-'}</span>
&nbsp;&nbsp;
<span class="reintegro">R: ${data.primitiva?.reintegro || '-'}</span>
</div>
<div class="bote">${data.primitiva?.bote || '-'}</div>
</div>
</div>

<div class="tarjeta bonoloto">
<div class="cabecera">
<img src="img/bonoloto-png.png" class="logo">
<div class="fecha">${data.bonoloto?.fecha || '--/--'}</div>
</div>
<div class="contenido">
<div class="resultado">
${txt(data.bonoloto?.numeros)}
<br>
<span class="complementario">C: ${data.bonoloto?.complementario || '-'}</span>
&nbsp;&nbsp;
<span class="reintegro">R: ${data.bonoloto?.reintegro || '-'}</span>
</div>
<div class="bote">${data.bonoloto?.bote || '-'}</div>
</div>
</div>

<div class="tarjeta euromillones">
<div class="cabecera">
<img src="img/euromillones-png.png" class="logo">

</div>
<div class="contenido">
<div class="resultado">
${txt(data.euromillones?.numeros)}
<br>
⭐ ${data.euromillones?.estrellas || '-'}
</div>
<div class="bote">${data.euromillones?.bote || '-'}</div>
</div>
</div>

<div class="tarjeta eurodreams">
<div class="cabecera">
<img src="img/eurodreams-png.png" class="logo">
<div class="fecha">${data.eurodreams?.fecha || '--/--'}</div>
</div>
<div class="contenido">

${txt(data.eurodreams?.numeros)}
<br>

</div>
<div class="bote">${data.eurodreams?.premio || '-'}</div>
</div>
</div>

<div class="tarjeta gordo">
<div class="cabecera">
<img src="img/gordo-png.png" class="logo">
<div class="fecha">${data.gordo?.fecha || '--/--'}</div>
</div>
<div class="contenido">
<div class="resultado">
${txt(data.gordo?.numeros)}
<br>
Clave: ${data.gordo?.clave || '-'}
</div>
<div class="bote">${data.gordo?.bote || '-'}</div>
</div>
</div>

<div class="tarjeta quiniela">
<div class="cabecera">
<img src="img/quiniela-png.png" class="logo">
<div class="fecha">${data.quiniela?.fecha || '--/--'}</div>

</div>

<div class="tarjeta quinigol">

<img src="img/loterianacional-png.png" class="logo logo-nacional">
<div class="fecha">J/S</div>
</div>

<div class="contenido-nacional">

<div class="columna-nacional">
<div class="titulo-nacional">JUEVES ${data.jueves?.fecha || '--/--'}</div>

<div class="columna-nacional">

})
.catch(err => {
  console.error('Error cargando datos.json:', err);
  document.getElementById('contenedor').innerHTML = '<h2 style="text-align:center;color:red;margin:40px">Error cargando datos</h2>';
});

</script></body>
</html>
