name: Actualizar Loterias
on:
  schedule:
    - cron: '0 */4 *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python scripts/sorteos.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos/sorteos.json
          git diff --staged --quiet || git commit -m "Auto actualizacion sorteos"
          git push
