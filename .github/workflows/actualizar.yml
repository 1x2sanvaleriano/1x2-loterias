name: Actualizar Loterias
on:
  schedule:
    - cron: '0 */4 *' # Cada 4 horas
  workflow_dispatch: # Y también manual

permissions:
  contents: write # NECESARIO para poder hacer push

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Necesario para push

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests beautifulsoup4 lxml

    - name: Run script
      run: python scripts/sorteos.py

    - name: Commit changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add datos.json
        git diff --staged --quiet || git commit -m "Auto update sorteos $(date +'%Y-%m-%d %H:%M')"
        git push
